# Match result calculation parameters for the simulation engine.
#
# All values are provisional and subject to community review.
# Rationale will be documented in docs/simulation-rules.md (M4).

# Home advantage multiplier for expected goals.
# When is_home=True, expected_for *= this factor.
# When is_home=False, expected_against *= this factor (opponent is at home).
# Must be > 0.
home_advantage_factor = 1.1

# How much pressing_intensity difference from the baseline manager
# affects expected_goals_for. Multiplicative adjustment:
#   pressing_delta = (current - baseline) / baseline
#   attack_factor = clamp(1.0 + delta * weight, 0.95, 1.05)
# Only affects expected_for (attack side). Defense is unchanged.
# All values are provisional estimates.
pressing_attack_weight = 0.10
