# Weekly state update parameters for the simulation engine.
#
# All values are provisional and subject to community review.
# Rationale will be documented in docs/simulation-rules.md (M4).

# Fatigue added to each player who played in the match (0.0-1.0 scale).
base_fatigue_increase = 0.05

# Fatigue recovered by each player who did not play (0.0-1.0 scale).
# Clamped so fatigue never goes below 0.0.
base_fatigue_recovery = 0.03

# Weekly gain in tactical_understanding (0.0-1.0 scale).
# Actual gain = adaptation_rate * tactical_understanding_gain.
# Clamped so tactical_understanding never exceeds 1.0.
tactical_understanding_gain = 0.04

# How much fatigue reduces the agent_state_factor in match result
# calculation. factor = avg_form * (1.0 - avg_fatigue * this_weight).
# Range: 0.0-1.0. Higher = fatigue has more impact on match performance.
fatigue_penalty_weight = 0.5

# manager_trust change per week (0.0-1.0 scale).
trust_increase_on_start = 0.02
trust_decrease_on_bench = 0.01

# current_form update (0.0-1.0 scale).
# Form represents recent team-result momentum. Updated for starters only;
# non-starters keep their current form unchanged.
# Draws have no effect on form. All values are provisional estimates.
form_boost_on_win = 0.06
form_drop_on_loss = 0.04
# Form penalty when a player samples "resist" action at a turning point.
form_drop_on_resist = 0.05

# Base trust decline when a player samples "resist" action (0.0-1.0 scale).
# Actual penalty is modulated by manager style_stubbornness:
#   penalty = base * (0.5 + style_stubbornness / 100.0 * 0.5)
# At stubbornness=50 (neutral), effective decline ≈ 0.03 (matches prior behaviour).
trust_decline_on_resist = 0.04

# Initial tactical_understanding after a new manager appointment (0.0-1.0 scale).
# Actual initial value is modulated by manager implementation_speed:
#   initial = base + (implementation_speed / 100.0) * speed_bonus
# At speed=50 (neutral), initial ≈ 0.275 (close to prior fixed 0.25).
initial_understanding_base = 0.20
initial_understanding_speed_bonus = 0.15
